name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: |
          cd android-widget
          gradle assembleDebug

      - name: Build release APK
        run: |
          cd android-widget
          gradle assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekWidget-debug
          path: android-widget/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekWidget-release
          path: android-widget/app/build/outputs/apk/release/app-release-unsigned.apk
