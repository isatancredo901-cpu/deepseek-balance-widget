name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle 8.5 wrapper (in temp dir)
        run: |
          mkdir -p /tmp/gradle-init
          cd /tmp/gradle-init
          gradle wrapper --gradle-version 8.5
          cp gradlew gradlew.bat "$GITHUB_WORKSPACE/android-widget/"
          cp gradle/wrapper/gradle-wrapper.jar "$GITHUB_WORKSPACE/android-widget/gradle/wrapper/"
          chmod +x "$GITHUB_WORKSPACE/android-widget/gradlew"

      - name: Build debug APK
        run: |
          cd android-widget
          ./gradlew assembleDebug

      - name: Build release APK
        run: |
          cd android-widget
          ./gradlew assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekWidget-debug
          path: android-widget/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekWidget-release
          path: android-widget/app/build/outputs/apk/release/app-release-unsigned.apk
