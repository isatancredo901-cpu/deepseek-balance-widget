name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          # 用临时项目生成 Gradle 8.7 wrapper（避免系统 Gradle 9.x 冲突）
          mkdir -p /tmp/wrap
          echo 'rootProject.name = "wrap"' > /tmp/wrap/settings.gradle.kts
          cd /tmp/wrap
          gradle wrapper --gradle-version 8.7
          cp gradlew "$GITHUB_WORKSPACE/android-widget/"
          cp gradle/wrapper/gradle-wrapper.jar "$GITHUB_WORKSPACE/android-widget/gradle/wrapper/"
          chmod +x "$GITHUB_WORKSPACE/android-widget/gradlew"
          # 用 Gradle 8.7 构建
          cd "$GITHUB_WORKSPACE/android-widget"
          ./gradlew assembleDebug

      - name: Build release APK
        run: |
          cd android-widget
          ./gradlew assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekWidget-debug
          path: android-widget/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekWidget-release
          path: android-widget/app/build/outputs/apk/release/app-release-unsigned.apk
